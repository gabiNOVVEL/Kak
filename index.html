<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gabriel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'serif';
            display: flex;
            justify-content: center;
            min-height: 150vh; /* Увеличил высоту, чтобы была легкая прокрутка вниз */
            padding: 40px 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 1.6rem; /* Уменьшил размер имени */
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 8px;
        }

        .geo {
            font-size: 0.6rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .work {
            margin-bottom: 100px; /* Отступ, чтобы контакты ушли ниже */
        }

        .work h2 {
            font-size: 1.1rem; /* Уменьшил название новеллы */
            font-weight: normal;
            margin-bottom: 8px;
        }

        .work p {
            font-style: italic;
            color: #600; /* Более тусклый красный, чтобы не бил в глаза */
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .update-tag {
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 1px;
        }

        .contacts {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid #111;
        }

        .btn {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem; /* Маленькая кнопка */
            border: 1px solid #333; /* Рамка теперь темнее, не такая яркая */
            padding: 8px 25px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn:active {
            border-color: #fff;
            color: #fff;
        }

        .email {
            font-size: 0.7rem;
            color: #333;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Gabriel</h1>
            <div class="geo">Moldova</div>
        </header>

        <section class="work">
            <h2>Архив стертых криков</h2>
            <p>Переплет из несбывшихся дней</p>
            <div class="update-tag">Глава 2 — опубликована вчера</div>
        </section>

        <!-- Блок контактов теперь ниже, нужно чуть прокрутить -->
        <nav class="contacts">
            <a href="https://t.me/OiCvoi" class="btn">TELEGRAM</a>
            <a href="mailto:gabihjkp@gmail.com" class="email">gabihjkp@gmail.com</a>
        </nav>
    </div>

</body>
</html>
